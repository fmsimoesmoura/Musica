name: build

# Build installable bundles on real Windows + macOS runners.
# Trigger manually (Actions tab → Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # Reliable runners — these gate the release.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Python sidecar (PyInstaller)
        shell: bash
        working-directory: backend
        run: |
          uv venv --python 3.12
          uv pip install -e .
          uv pip install pyinstaller
          ./build_sidecar.sh
      - name: Install frontend deps
        working-directory: desktop
        run: npm install
      - name: Build app bundle
        working-directory: desktop
        run: npm run tauri build
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tidal-manager-${{ matrix.name }}
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe

  # NOTE: Intel macOS (macos-13) is intentionally omitted — GitHub's Intel runners
  # queue indefinitely (capacity is being retired). Intel users build from source
  # (see README). Apple Silicon + Windows cover virtually all current machines.

  # Publish the release from the reliable builds as soon as they finish.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.exe
