name: build

# Build installable bundles on real Windows + macOS runners.
# Trigger manually (Actions tab → Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Python sidecar (PyInstaller)
        shell: bash
        working-directory: backend
        run: |
          uv venv --python 3.12
          uv pip install -e .
          uv pip install pyinstaller
          ./build_sidecar.sh

      - name: Install frontend deps
        working-directory: desktop
        run: npm install

      - name: Build app bundle
        working-directory: desktop
        run: npm run tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tidal-manager-${{ matrix.name }}
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
