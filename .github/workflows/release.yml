name: build

# Build installable bundles on real Windows + macOS runners.
# Trigger manually (Actions tab → Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # Reliable runners — these gate the release.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Python sidecar (PyInstaller)
        shell: bash
        working-directory: backend
        run: |
          uv venv --python 3.12
          uv pip install -e .
          uv pip install pyinstaller
          ./build_sidecar.sh
      - name: Install frontend deps
        working-directory: desktop
        run: npm install
      - name: Build app bundle
        working-directory: desktop
        run: npm run tauri build
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tidal-manager-${{ matrix.name }}
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe

  # Intel macOS runners queue slowly / are being phased out — best-effort, never
  # blocks the release. Its .dmg is attached afterward (attach-intel) if it builds.
  build-intel:
    runs-on: macos-13
    continue-on-error: true
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Python sidecar (PyInstaller)
        shell: bash
        working-directory: backend
        run: |
          uv venv --python 3.12
          uv pip install -e .
          uv pip install pyinstaller
          ./build_sidecar.sh
      - name: Install frontend deps
        working-directory: desktop
        run: npm install
      - name: Build app bundle
        working-directory: desktop
        run: npm run tauri build
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: tidal-manager-macos-intel
          if-no-files-found: error
          path: desktop/src-tauri/target/release/bundle/**/*.dmg

  # Publish the release from the reliable builds as soon as they finish.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.exe

  # Attach the Intel .dmg to the same release if/when it builds (non-blocking).
  attach-intel:
    needs: [build-intel, release]
    if: ${{ always() && needs.build-intel.result == 'success' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tidal-manager-macos-intel
          path: dist-intel
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: dist-intel/**/*.dmg
